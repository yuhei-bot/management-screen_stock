<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in'dex hair 在庫管理</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --accent-color: #34495e;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --plus-color: #3498db;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --border-color: #ddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: white;
            padding: 40px 0 30px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .header-main {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #333; 
        }

        .live-clock {
            font-size: 1.1rem;
            color: #888;
            margin-left: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: normal;
        }

        nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }

        .nav-item {
            text-decoration: none; color: #444; font-size: 1.1rem; font-weight: bold; 
            padding: 12px 25px; border-radius: 10px; border: 1px solid var(--border-color);
            background: white; transition: 0.2s;
        }

        .nav-item.active { background: var(--accent-color); color: white; }

        main { padding: 40px 20px; width: 95%; max-width: 1400px; }

        .section-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }

        .category-container { display: flex; gap: 10px; margin-bottom: 25px; align-items: center; }

        .category-nav {
            display: flex; gap: 10px; padding: 10px; background: #fff; border-radius: 15px;
            overflow-x: auto; flex-grow: 1;
        }

        .category-btn {
            padding: 8px 18px; border: 1px solid var(--border-color); border-radius: 20px;
            background: white; cursor: pointer; font-weight: bold; white-space: nowrap;
        }

        .category-btn.active { background: var(--plus-color); color: white; border-color: var(--plus-color); }

        .add-btn {
            background: var(--plus-color); color: white; border: none; padding: 10px 20px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .stock-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        .stock-card {
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            box-shadow: var(--shadow); position: relative; border: 2px solid transparent;
            display: flex; flex-direction: column;
        }

        /* 状態別カラー */
        .stock-card.warning { background-color: #fff9db; border-color: var(--warning-color); }
        .stock-card.danger { background-color: #ffe3e3; border-color: var(--danger-color); }
        .stock-card.danger .stock-count { color: var(--danger-color); }

        .card-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }

        /* 編集ボタンのホバー色設定 */
        .action-icon { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .action-icon.edit-btn:hover { color: var(--plus-color); }
        .action-icon.delete-btn:hover { color: var(--danger-color); }

        .item-category-tag { font-size: 0.7rem; color: var(--plus-color); background: #eaf4fb; padding: 2px 8px; border-radius: 4px; width: fit-content; margin-bottom: 8px; }

        .item-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; min-height: 2.8rem; }

        .stock-control {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px;
        }

        /* 数字をクリック可能に */
        .stock-count { font-size: 1.8rem; font-weight: bold; cursor: pointer; padding: 0 10px; border-radius: 5px; transition: 0.2s; }
        .stock-count:hover { background: rgba(0,0,0,0.05); }

        .count-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee; background: white; cursor: pointer; font-size: 1.2rem; }

        .update-date { font-size: 0.75rem; color: #aaa; text-align: right; margin-top: 15px; }

    </style>
</head>
<body>

<header>
    <div class="header-main">
        <div class="logo">in'dex hair <span id="clock" class="live-clock"></span></div>
    </div>
    <nav>
     <a href="https://yuhei-bot.github.io/-management-screen_calendar/" class="nav-item"><span>📅 カレンダー</span></a>
        <a href="#" class="nav-item"><span>⏳ タイムライン</span></a>
        <a href="https://yuhei-bot.github.io/management-screen_gallery/" class="nav-item"><span>🖼️ ギャラリー編集</span></a>
        <a href="https://yuhei-bot.github.io/-management-screen_-sales/#" class="nav-item active"><span>💰 売上管理</span></a>
        <a href="https://yuhei-bot.github.io/management-screen_stock/#" class="nav-item active"><span>📦在庫一覧</span></a>
    </nav>
    </nav>
</header>

<main>
    <div class="section-header">
        <span style="font-size: 1.5rem; font-weight: bold;">在庫一覧 (アラート順)</span>
        <button class="add-btn" onclick="addItem()">＋ 追加</button>
    </div>

    <div class="category-container">
        <div id="category-tabs" class="category-nav"></div>
        <button onclick="addCategory()" style="background:none; border:1px dashed #3498db; color:#3498db; border-radius:10px; cursor:pointer; width:40px; height:40px;">＋</button>
    </div>

    <div id="stock-list" class="stock-grid"></div>
    <div id="empty-msg" style="text-align:center; color:#aaa; margin-top:50px; display:none;">アイテムがありません</div>
</main>

<script>
    // データ初期化
    let inventory = JSON.parse(localStorage.getItem('index_hair_stock')) || [];
    let categories = JSON.parse(localStorage.getItem('index_hair_categories')) || ["すべて", "シャンプー", "カラー剤", "トリートメント", "その他"];
    let currentFilter = 'すべて';

    function saveData() {
        localStorage.setItem('index_hair_stock', JSON.stringify(inventory));
        localStorage.setItem('index_hair_categories', JSON.stringify(categories));
        renderAll();
    }

    // 時計
    function updateClock() {
        const now = new Date();
        const timeStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        const clockEl = document.getElementById('clock');
        if(clockEl) clockEl.textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // カテゴリー追加
    function addCategory() {
        const name = prompt("新規カテゴリー名：");
        if (name && !categories.includes(name)) {
            categories.push(name);
            currentFilter = name;
            saveData();
        }
    }

    // アイテム追加
    function addItem() {
        const name = prompt("商品名：");
        if (!name) return;
        const defaultCat = currentFilter === 'すべて' ? "その他" : currentFilter;
        const category = prompt("カテゴリー：", defaultCat);
        if (!category) return;
        
        if (!categories.includes(category)) categories.push(category);
        inventory.push({ id: Date.now(), name, count: 0, category, lastUpdate: new Date().toLocaleDateString() });
        currentFilter = category;
        saveData();
    }

    // 在庫数変更（ボタン）
    function changeStock(id, amt) {
        const item = inventory.find(i => i.id === id);
        if (item) {
            item.count = Math.max(0, item.count + amt);
            item.lastUpdate = new Date().toLocaleDateString();
            saveData();
        }
    }

    // 【新規】在庫数変更（直接入力）
    function inputStock(id) {
        const item = inventory.find(i => i.id === id);
        if (!item) return;

        const val = prompt(`${item.name} の在庫数を入力してください（半角数字のみ）`, item.count);
        
        // キャンセルされたら終了
        if (val === null) return;

        // 全角数字を半角に変換する簡易処理
        const hanVal = val.replace(/[０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });

        // 半角数字チェック
        if (hanVal === "" || isNaN(hanVal)) {
            alert("エラー：半角数字で入力してください。");
            return;
        }

        item.count = Math.max(0, parseInt(hanVal, 10));
        item.lastUpdate = new Date().toLocaleDateString();
        saveData();
    }

    // 【修正】アイテム名とカテゴリーの編集
    function editItem(id) {
        const item = inventory.find(i => i.id === id);
        if (!item) return;

        const newName = prompt("商品名を編集：", item.name);
        if (!newName) return;

        const newCat = prompt(`カテゴリーを編集（現在のリスト: ${categories.filter(c=>c!=='すべて').join(', ')}）`, item.category);
        if (!newCat) return;

        item.name = newName;
        item.category = newCat;
        if (!categories.includes(newCat)) categories.push(newCat);
        
        item.lastUpdate = new Date().toLocaleDateString();
        saveData();
    }

    function deleteItem(id) {
        if (confirm("削除しますか？")) {
            inventory = inventory.filter(i => i.id !== id);
            saveData();
        }
    }

    // 描画
    function renderAll() {
        document.getElementById('category-tabs').innerHTML = categories.map(cat => 
            `<button class="category-btn ${currentFilter === cat ? 'active' : ''}" onclick="currentFilter='${cat}';renderAll()">${cat}</button>`
        ).join('');

        const list = document.getElementById('stock-list');
        let displayList = currentFilter === 'すべて' ? [...inventory] : inventory.filter(i => i.category === currentFilter);

        displayList.sort((a, b) => {
            if (a.count !== b.count) return a.count - b.count;
            return b.id - a.id;
        });

        document.getElementById('empty-msg').style.display = displayList.length ? 'none' : 'block';

        list.innerHTML = displayList.map(item => {
            let status = item.count <= 2 ? "danger" : (item.count <= 5 ? "warning" : "");
            return `
                <div class="stock-card ${status}">
                    <div class="card-actions">
                        <button class="action-icon edit-btn" onclick="editItem(${item.id})" title="編集">✎</button>
                        <button class="action-icon delete-btn" onclick="deleteItem(${item.id})" title="削除">🗑</button>
                    </div>
                    <div class="item-category-tag">${item.category}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="stock-control">
                        <button class="count-btn" onclick="changeStock(${item.id}, -1)">-</button>
                        <div class="stock-count" onclick="inputStock(${item.id})" title="クリックして数字を入力">${item.count}</div>
                        <button class="count-btn" onclick="changeStock(${item.id}, 1)">+</button>
                    </div>
                    <div class="update-date">更新: ${item.lastUpdate}</div>
                </div>
            `;
        }).join('');
    }

    renderAll();
</script>
</body>
</html>
